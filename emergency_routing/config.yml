graphhopper:
  datareader.file: data/north-eastern-zone-latest.osm.pbf
  graph.location: data/graphhopper-cache

  import.osm.ignored_highways: footway, cycleway, path, pedestrian, steps

  graph.encoded_values: car_access, car_average_speed, road_access, road_class, road_environment, max_speed, ferry_speed

  profiles:
    - name: car
      custom_model_files: [car.json]
    - name: emergency
      custom_model_files: [car.json]

  profiles_ch:
    - profile: car
    - profile: emergency

server:
  application_connectors:
    - type: http
      port: 8989
  admin_connectors:
    - type: http
      port: 8990
